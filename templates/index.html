<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Scraper Terminal</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Market Scraper Terminal</h1>
        <p class="subtitle">
          Insere um ou muitos tickers (um por linha) e processa em lote.
        </p>
      </header>

      <section class="controls-panel">
        <div class="field">
          <label for="source">Fonte</label>
          <select id="source">
            {% for source in sources %}
            <option value="{{ source }}">
              {{ source.replace('_', ' ').title() }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label for="market">Mercado</label>
          <select id="market">
            {% for code, name in markets.items() %}
            <option value="{{ code }}">{{ name }}</option>
            {% endfor %}
          </select>
        </div>
      </section>

      <section class="batch-input">
        <div class="field">
          <label for="tickers">Tickers (um por linha ou separados por vírgula)</label>
          <textarea id="tickers" rows="8" placeholder="Ex: AAPL&#10;MSFT&#10;NVDA"></textarea>
        </div>
        <div class="actions">
          <button id="batchSearchBtn" class="btn-primary">Processar tickers</button>
        </div>
      </section>

      <section class="quick-examples">
        <span>Exemplos rápidos:</span>
        <button class="chip" data-ticker="AAPL, MSFT, NVDA, TSLA, AMZN">Mega Tech (US)</button>
        <button class="chip" data-ticker="NOS, SON, GALP, EDP">PSI (PT)</button>
        <button class="chip" data-ticker="PETR4, VALE3, ITUB4">B3 (BR)</button>
      </section>

      <section id="statusSection" class="status-section" style="display: none;">
        <div id="status" class="status">À espera de processamento...</div>
        <div id="summary" class="summary-grid">
          <!-- Stats injected here -->
        </div>
      </section>

      <section id="errorSection" class="error-section" style="display: none;">
        <h3>Erros Isolados</h3>
        <ul id="errorList"></ul>
      </section>

      <section id="resultsSection" class="results-section" style="display: none;">
        <div class="table-header">
          <h3>Resultados</h3>
          <div class="btn-group">
            <button id="exportJsonBtn" class="btn-secondary">Exportar JSON</button>
            <button id="exportSheetsBtn" class="btn-secondary" style="background: #059669; margin-left: 10px;">Exportar Sheets</button>
            <button id="syncFirebaseBtn" class="btn-secondary" style="background: #fbbf24; color: #000; margin-left: 10px;">Sincronizar Cloud</button>
          </div>
        </div>
        <div id="exportStatus" style="padding: 0 1.5rem 1rem; font-size: 0.85rem; display: none; text-align: right;"></div>
        <div class="table-wrapper">
          <table id="resultsTable">
            <thead>
              <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
