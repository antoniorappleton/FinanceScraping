name: Fast Price Sync

on:
  schedule:
    # Runs every 6 hours at minute 15 to avoid GitHub's on-the-hour congestion
    # 04 runs/day × 31 days ≈ 124 runs/month — well within free tier
    - cron: '15 */6 * * *'
  workflow_dispatch:

# Prevent overlapping runs — cancel any in-progress fast sync
concurrency:
  group: fast-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create service account file
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > serviceAccountKey.json

      - name: Run fast scrape
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ./serviceAccountKey.json
        run: python cron_scraper.py --mode=fast
