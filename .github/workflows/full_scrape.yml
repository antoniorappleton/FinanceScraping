name: Full Financial Sync

on:
  schedule:
    # Runs once daily at 02:30 UTC (03:30 Lisbon time)
    # 1 run/day × 31 days ≈ 31 runs/month
    - cron: '30 2 * * *'
  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: full-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create service account file
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > serviceAccountKey.json

      - name: Run full scraper
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ./serviceAccountKey.json
        run: python cron_scraper.py --mode=full
